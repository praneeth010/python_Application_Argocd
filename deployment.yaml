apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-devops-app
  template:
    metadata:
      labels:
        app: python-devops-app
    spec:
      containers:
      - name: python-devops-container
        image: praneeth0108/python-devops-app:8
        ports:
        - containerPort: 5000
