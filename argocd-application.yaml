apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-devops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/praneeth010/python_Application_Argocd.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
